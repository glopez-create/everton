<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everton — Cocina KDS</title>
<link rel="stylesheet" href="/css/everton.css">
<style>
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #0D1117; color: #fff; }
.ev-header { background: var(--ev-blue3); border-bottom: 2px solid var(--ev-gold); }
.ev-logo-zone { background: var(--ev-gold); }
.ev-clock { color: var(--ev-gold); font-size: 18px; }
.kds-stats-bar { background: #161B22; border-bottom: 1px solid #30363D; padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.kds-stat { background: #21262D; border-radius: 8px; padding: 6px 14px; display: flex; align-items: center; gap: 8px; }
.kds-stat-dot { width: 10px; height: 10px; border-radius: 50%; }
.kds-stat-val { font-family: var(--fc); font-size: 18px; font-weight: 800; }
.kds-stat-lbl { font-size: 11px; color: #8B949E; font-weight: 600; font-family: var(--fc); letter-spacing: .04em; }
.kds-avg { margin-left: auto; font-family: var(--fc); font-size: 13px; color: #8B949E; }
.kds-avg span { color: var(--ev-gold); font-weight: 800; }
.kds-cols { display: flex; flex: 1; overflow: hidden; }
.kds-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid #30363D; }
.kds-col:last-child { border-right: none; }
.kds-col-hdr { padding: 10px 14px; border-bottom: 1px solid #30363D; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.kds-col-hdr.nueva { background: #0D2137; border-bottom-color: #1D6FA4; }
.kds-col-hdr.preparando { background: #1F1600; border-bottom-color: #7D4E00; }
.kds-col-hdr.lista { background: #0D1F0D; border-bottom-color: #1A6B1A; }
.col-title { font-family: var(--fc); font-size: 13px; font-weight: 800; letter-spacing: .08em; }
.col-count { margin-left: auto; background: rgba(255,255,255,.1); border-radius: 99px; font-family: var(--fc); font-size: 12px; font-weight: 800; padding: 2px 10px; }
.kds-col-body { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
.kds-col-body::-webkit-scrollbar { width: 3px; }
.kds-col-body::-webkit-scrollbar-thumb { background: #30363D; border-radius: 99px; }
.kds-card { background: #161B22; border-radius: 10px; overflow: hidden; border: 1px solid #30363D; animation: slideIn .35s ease; }
.kds-card.nueva { border-top: 3px solid #3B82F6; }
.kds-card.preparando { border-top: 3px solid #F59E0B; }
.kds-card.lista { border-top: 3px solid #10B981; }
@keyframes slideIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.kc-hdr { padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #30363D; }
.kc-mesa { font-family: var(--fc); font-size: 15px; font-weight: 800; color: #fff; }
.kc-order-id { font-size: 11px; color: #8B949E; font-family: var(--fc); }
.kc-mozo { font-size: 11px; color: #58A6FF; font-family: var(--fc); margin-top: 1px; }
.kc-timer { font-family: var(--fc); font-size: 13px; font-weight: 800; padding: 4px 10px; border-radius: 99px; }
.kc-timer.ok { background: #0D2E1F; color: #3FB950; }
.kc-timer.warn { background: #271700; color: #F0883E; }
.kc-timer.late { background: #2D0C0C; color: #FF7B72; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }
.kc-items { padding: 10px 12px; }
.kc-item { display: flex; align-items: baseline; gap: 8px; padding: 4px 0; border-bottom: 1px solid #21262D; }
.kc-item:last-child { border-bottom: none; }
.kc-qty { font-family: var(--fc); font-size: 16px; font-weight: 800; color: var(--ev-gold); min-width: 24px; }
.kc-name { font-size: 13px; font-weight: 500; color: #C9D1D9; }
.kc-nota { background: #271700; color: #F0883E; font-size: 11px; padding: 4px 10px; margin: 4px 12px 8px; border-radius: 6px; border-left: 3px solid #F0883E; }
.kc-btn { width: 100%; padding: 11px; font-size: 13px; font-weight: 800; letter-spacing: .05em; border: none; cursor: pointer; font-family: var(--fc); transition: all .12s; }
.kc-btn.start { background: #1D4ED8; color: #fff; }
.kc-btn.start:hover { background: #2563EB; }
.kc-btn.ready { background: #059669; color: #fff; }
.kc-btn.ready:hover { background: #10B981; }
.kc-btn.bump { background: #21262D; color: #8B949E; }
.kc-btn.bump:hover { background: #30363D; color: #C9D1D9; }
.kds-empty { text-align: center; padding: 40px 14px; color: #30363D; }
.kds-empty-icon { font-size: 40px; margin-bottom: 10px; }
.kds-empty p { font-family: var(--fc); font-size: 13px; font-weight: 700; letter-spacing: .04em; }
</style>
</head>
<body>
<header class="ev-header">
  <div class="ev-logo-zone">
    <div class="ev-crest">EVT</div>
    <div>
      <div class="ev-title">CLUB EVERTON</div>
      <div class="ev-subtitle">LA PLATA · COCINA</div>
    </div>
  </div>
  <div class="ev-header-center">
    <span class="ev-screen-name">KITCHEN DISPLAY SYSTEM</span>
  </div>
  <div class="live-badge"><div class="live-dot"></div> EN VIVO</div>
  <div class="ev-clock" id="clock">--:--</div>
</header>
<div class="kds-stats-bar">
  <div class="kds-stat"><div class="kds-stat-dot" style="background:#3B82F6"></div><div class="kds-stat-val" id="count-nueva">0</div><div class="kds-stat-lbl">NUEVAS</div></div>
  <div class="kds-stat"><div class="kds-stat-dot" style="background:#F59E0B"></div><div class="kds-stat-val" id="count-prep">0</div><div class="kds-stat-lbl">EN PREPARACIÓN</div></div>
  <div class="kds-stat"><div class="kds-stat-dot" style="background:#10B981"></div><div class="kds-stat-val" id="count-lista">0</div><div class="kds-stat-lbl">LISTAS</div></div>
  <div class="kds-avg">Tiempo promedio: <span id="avg-time">—</span></div>
</div>
<div class="kds-cols">
  <div class="kds-col">
    <div class="kds-col-hdr nueva"><div class="kds-stat-dot" style="background:#3B82F6"></div><span class="col-title" style="color:#58A6FF">NUEVAS</span><span class="col-count" id="badge-nueva">0</span></div>
    <div class="kds-col-body" id="col-nueva"></div>
  </div>
  <div class="kds-col">
    <div class="kds-col-hdr preparando"><div class="kds-stat-dot" style="background:#F59E0B"></div><span class="col-title" style="color:#F0883E">EN PREPARACIÓN</span><span class="col-count" id="badge-prep">0</span></div>
    <div class="kds-col-body" id="col-prep"></div>
  </div>
  <div class="kds-col">
    <div class="kds-col-hdr lista"><div class="kds-stat-dot" style="background:#10B981"></div><span class="col-title" style="color:#3FB950">LISTAS PARA SERVIR</span><span class="col-count" id="badge-lista">0</span></div>
    <div class="kds-col-body" id="col-lista"></div>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>

  const btnMap = { nueva:{cls:'start',label:'▶  INICIAR PREPARACIÓN'}, preparando:{cls:'ready',label:'✓  MARCAR LISTA'}, lista:{cls:'bump',label:'↑  ENTREGADA — BUMP'} };
  const btn = btnMap[o.status];
  return `<div class="kds-card ${o.status}"><div class="kc-hdr"><div><div class="kc-mesa">${o.mesa}</div><div class="kc-order-id">${o.id}</div><div class="kc-mozo">Mozo: ${o.mozo}</div></div><div class="kc-timer ${timerClass(mins)}">${mins < 1 ? '< 1 min' : mins + ' min'}</div></div><div class="kc-items">${o.items.map(i => `<div class="kc-item"><span class="kc-qty">${i.qty}x</span><span class="kc-name">${i.name}</span></div>`).join('')}</div>${o.nota ? `<div class="kc-nota">⚠ ${o.nota}</div>` : ''}<button class="kc-btn ${btn.cls}" onclick="advance('${o.id}')">${btn.label}</button></div>`;
