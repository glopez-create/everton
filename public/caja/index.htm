<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everton — Caja Táctil</title>
<link rel="stylesheet" href="/css/everton.css">
<style>
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.layout { display: flex; flex: 1; overflow: hidden; }
.pos-left { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.cat-bar { background: #fff; border-bottom: 1px solid var(--gray3); padding: 10px 14px; display: flex; gap: 8px; overflow-x: auto; flex-shrink: 0; }
.cat-bar::-webkit-scrollbar { display: none; }
.cat-pill { font-family: var(--fc); font-size: 13px; font-weight: 700; padding: 7px 16px; border-radius: 99px; cursor: pointer; border: 1.5px solid var(--gray4); background: #fff; color: var(--text2); white-space: nowrap; letter-spacing: .03em; transition: all .12s; }
.cat-pill:hover { border-color: var(--ev-blue); color: var(--ev-blue); }
.cat-pill.active { background: var(--ev-blue); color: #fff; border-color: var(--ev-blue); }
.items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 12px; overflow-y: auto; flex: 1; }
.item-card { background: #fff; border: 1.5px solid var(--gray3); border-radius: var(--rl); padding: 12px; cursor: pointer; transition: all .12s; position: relative; text-align: left; font-family: var(--f); }
.item-card:hover { border-color: var(--ev-blue); background: var(--ev-light); }
.item-card:active { transform: scale(.96); }
.item-card.out { opacity: .4; cursor: not-allowed; }
.item-emoji { font-size: 26px; display: block; margin-bottom: 6px; }
.item-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
.item-price { font-family: var(--fc); font-size: 15px; font-weight: 800; color: var(--ev-blue); }
.item-time { font-size: 10px; color: var(--text2); margin-top: 2px; }
.out-tag { position: absolute; top: 6px; right: 6px; background: var(--danger-light); color: var(--danger); font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px; font-family: var(--fc); }
.ticket { width: 300px; flex-shrink: 0; background: #fff; border-left: 1px solid var(--gray3); display: flex; flex-direction: column; overflow: hidden; }
.ticket-hdr { background: var(--ev-blue); color: #fff; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.ticket-hdr h2 { font-family: var(--fc); font-size: 14px; font-weight: 800; letter-spacing: .06em; }
.ticket-hdr select { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); border-radius: 6px; color: #fff; font-family: var(--fc); font-size: 12px; font-weight: 700; padding: 4px 8px; cursor: pointer; }
.ticket-hdr select option { background: var(--ev-blue2); }
.mozo-row { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--ev-light); border-bottom: 1px solid var(--ev-mid); flex-shrink: 0; }
.mozo-row label { font-size: 11px; font-weight: 700; color: var(--ev-blue); font-family: var(--fc); }
.mozo-row input { flex: 1; font-family: var(--fc); font-size: 12px; font-weight: 700; border: 1px solid var(--ev-mid); border-radius: 5px; padding: 5px 8px; color: var(--ev-blue); background: #fff; }
.ticket-items { flex: 1; overflow-y: auto; padding: 6px 0; }
.ticket-empty { text-align: center; padding: 28px 14px; font-size: 12px; color: var(--text2); }
.t-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-bottom: 1px solid var(--gray2); }
.t-qty-ctrl { display: flex; align-items: center; gap: 4px; }
.t-qty-btn { width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--gray4); background: var(--gray2); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); font-family: var(--f); transition: all .1s; }
.t-qty-btn:hover { background: var(--ev-light); border-color: var(--ev-blue); }
.t-qty { font-family: var(--fc); font-size: 14px; font-weight: 800; min-width: 20px; text-align: center; color: var(--ev-blue); }
.t-name { flex: 1; font-size: 12px; font-weight: 500; color: var(--text); }
.t-sub { font-family: var(--fc); font-size: 13px; font-weight: 800; color: var(--ev-blue); }
.nota-input { margin: 8px 14px; font-family: var(--f); font-size: 12px; border: 1px solid var(--gray4); border-radius: 6px; padding: 7px 10px; color: var(--text); resize: none; width: calc(100% - 28px); }
.ticket-footer { border-top: 1px solid var(--gray3); padding: 12px 14px; flex-shrink: 0; background: #fff; }
.total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.total-label { font-family: var(--fc); font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: .04em; }
.total-val { font-family: var(--fc); font-size: 22px; font-weight: 800; color: var(--ev-blue); }
.send-btn { width: 100%; padding: 13px; font-size: 15px; letter-spacing: .06em; border-radius: var(--r); }
.clear-btn { width: 100%; padding: 7px; font-size: 12px; margin-top: 6px; border-radius: var(--r); border: none; }
.mesas-bar { padding: 10px 14px; background: var(--gray2); border-bottom: 1px solid var(--gray3); display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
.mesa-btn { font-family: var(--fc); font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 6px; cursor: pointer; border: 1.5px solid var(--gray4); background: #fff; color: var(--text2); letter-spacing: .03em; transition: all .1s; }
.mesa-btn:hover { border-color: var(--ev-blue); color: var(--ev-blue); }
.mesa-btn.active { background: var(--ev-gold); color: var(--ev-blue); border-color: var(--ev-gold2); }
.mesa-btn.ocupada { border-color: var(--ev-blue); background: var(--ev-light); color: var(--ev-blue); }
</style>
</head>
<body>
<header class="ev-header">
  <div class="ev-logo-zone">
    <div class="ev-crest">EVT</div>
    <div>
      <div class="ev-title">CLUB EVERTON</div>
      <div class="ev-subtitle">LA PLATA · RESTAURANTE</div>
    </div>
  </div>
  <div class="ev-header-center">
    <span class="ev-screen-name">CAJA TÁCTIL</span>
  </div>
  <div class="ev-clock" id="clock">--:--</div>
</header>
<div class="layout">
  <div class="pos-left">
    <div class="mesas-bar" id="mesas-bar"></div>
    <div class="cat-bar" id="cat-bar"></div>
    <div class="items-grid" id="items-grid"></div>
  </div>
  <div class="ticket">
    <div class="ticket-hdr">
      <h2 id="ticket-title">COMANDA</h2>
      <select id="mesa-sel" onchange="setMesa(this.value)">
        <option value="">— Mesa —</option>
      </select>
    </div>
    <div class="mozo-row">
      <label>MOZO:</label>
      <input type="text" id="mozo-input" value="Carlos" placeholder="Nombre del mozo">
    </div>
    <div class="ticket-items" id="ticket-items">
      <div class="ticket-empty">Seleccioná una mesa y agregá productos</div>
    </div>
    <textarea class="nota-input" id="nota-input" rows="2" placeholder="Nota para cocina (alergias, puntos de cocción...)"></textarea>
    <div class="ticket-footer">
      <div class="total-row">
        <span class="total-label">TOTAL</span>
        <span class="total-val" id="ticket-total">$0</span>
      </div>
      <button class="btn btn-primary send-btn" id="send-btn" onclick="sendOrder()" disabled>ENVIAR A COCINA</button>
      <button class="btn btn-gray clear-btn" onclick="clearTicket()">Limpiar comanda</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const ARS = v => '$' + Math.round(v).toLocaleString('es-AR');
const socket = io();
let ticket = [], mesaActual = '', activeCat = 'Todo', mesasConPedido = new Set();
const MESAS = ['Mesa 1','Mesa 2','Mesa 3','Mesa 4','Mesa 5','Mesa 6','Mesa 7','Mesa 8','Barra','Para llevar'];
const MENU = [
  {id:1,name:'Milanesa napolitana',emoji:'🍖',price:4200,time:'20 min',cat:'Platos'},
  {id:2,name:'Bife de chorizo',emoji:'🥩',price:5800,time:'25 min',cat:'Platos'},
  {id:3,name:'Pollo grillado',emoji:'🍗',price:3800,time:'18 min',cat:'Platos'},
  {id:4,name:'Ravioles al tuco',emoji:'🍝',price:3200,time:'15 min',cat:'Platos'},
  {id:5,name:'Cazuela de mariscos',emoji:'🦐',price:4800,time:'22 min',cat:'Platos'},
  {id:6,name:'Ensalada mixta',emoji:'🥗',price:1800,time:'5 min',cat:'Entradas'},
  {id:7,name:'Tabla de fiambres',emoji:'🧀',price:3400,time:'5 min',cat:'Entradas'},
  {id:8,name:'Empanadas x6',emoji:'🥟',price:2400,time:'12 min',cat:'Entradas'},
  {id:9,name:'Choripán',emoji:'🌭',price:1900,time:'8 min',cat:'Entradas'},
  {id:10,name:'Papas fritas',emoji:'🍟',price:1400,time:'12 min',cat:'Guarniciones'},
  {id:11,name:'Puré de papas',emoji:'🍲',price:1200,time:'10 min',cat:'Guarniciones'},
  {id:12,name:'Ensalada rusa',emoji:'🥔',price:1100,time:'5 min',cat:'Guarniciones'},
  {id:13,name:'Cerveza Quilmes 1L',emoji:'🍺',price:1800,time:'1 min',cat:'Bebidas'},
  {id:14,name:'Vino tinto copa',emoji:'🍷',price:1600,time:'1 min',cat:'Bebidas'},
  {id:15,name:'Gaseosa 500ml',emoji:'🥤',price:900,time:'1 min',cat:'Bebidas'},
  {id:16,name:'Agua mineral',emoji:'💧',price:700,time:'1 min',cat:'Bebidas'},
  {id:17,name:'Jugo naranja',emoji:'🍊',price:1100,time:'3 min',cat:'Bebidas'},
  {id:18,name:'Flan con crema',emoji:'🍮',price:1100,time:'3 min',cat:'Postres'},
  {id:19,name:'Helado 2 bochas',emoji:'🍨',price:1300,time:'2 min',cat:'Postres'},
  {id:20,name:'Brownie caliente',emoji:'🍫',price:1500,time:'8 min',cat:'Postres'},
];
const CATS = ['Todo','Platos','Entradas','Guarniciones','Bebidas','Postres'];
function init() { renderMesas(); renderCats(); renderItems(); updateClock(); setInterval(updateClock, 1000); }
function renderMesas() {
  document.getElementById('mesas-bar').innerHTML = MESAS.map(m => `<button class="mesa-btn ${m===mesaActual?'active':''} ${mesasConPedido.has(m)?'ocupada':''}" onclick="setMesa('${m}')">${m}</button>`).join('');
  document.getElementById('mesa-sel').innerHTML = '<option value="">— Mesa —</option>' + MESAS.map(m => `<option value="${m}" ${m===mesaActual?'selected':''}>${m}</option>`).join('');
}
function setMesa(m) { mesaActual = m; document.getElementById('ticket-title').textContent = m ? `COMANDA — ${m.toUpperCase()}` : 'COMANDA'; document.getElementById('mesa-sel').value = m; renderMesas(); validateSend(); }
function renderCats() { document.getElementById('cat-bar').innerHTML = CATS.map(c => `<div class="cat-pill ${c===activeCat?'active':''}" onclick="setCat('${c}',this)">${c}</div>`).join(''); }
function setCat(cat, el) { activeCat = cat; document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active')); el.classList.add('active'); renderItems(); }
function renderItems() {
  const list = activeCat === 'Todo' ? MENU : MENU.filter(i => i.cat === activeCat);
  document.getElementById('items-grid').innerHTML = list.map(item => `<button class="item-card ${item.out?'out':''}" onclick="${item.out?`showToast('Sin stock')`:`addItem(${item.id})`}">${item.out ? '<div class="out-tag">SIN STOCK</div>' : ''}<span class="item-emoji">${item.emoji}</span><div class="item-name">${item.name}</div><div class="item-price">${ARS(item.price)}</div><div class="item-time">⏱ ${item.time}</div></button>`).join('');
}
function addItem(id) { const item = MENU.find(i => i.id === id); if (!item||item.out) return; const ex = ticket.find(t => t.id === id); if (ex) ex.qty++; else ticket.push({...item, qty:1}); renderTicket(); }
function changeQty(id, d) { const idx = ticket.findIndex(t => t.id === id); if (idx<0) return; ticket[idx].qty += d; if (ticket[idx].qty <= 0) ticket.splice(idx,1); renderTicket(); }
function renderTicket() {
  const el = document.getElementById('ticket-items');
  if (!ticket.length) { el.innerHTML='<div class="ticket-empty">Tocá un producto para agregar</div>'; document.getElementById('ticket-total').textContent='$0'; validateSend(); return; }
  el.innerHTML = ticket.map(t => `<div class="t-item"><div class="t-qty-ctrl"><button class="t-qty-btn" onclick="changeQty(${t.id},-1)">−</button><span class="t-qty">${t.qty}</span><button class="t-qty-btn" onclick="changeQty(${t.id},1)">+</button></div><span class="t-name">${t.name}</span><span class="t-sub">${ARS(t.price*t.qty)}</span></div>`).join('');
  document.getElementById('ticket-total').textContent = ARS(ticket.reduce((s,t) => s+t.price*t.qty, 0));
  validateSend();
}
function validateSend() { document.getElementById('send-btn').disabled = !ticket.length || !mesaActual; }
function clearTicket() { ticket = []; document.getElementById('nota-input').value = ''; renderTicket(); }
function sendOrder() {
  if (!ticket.length || !mesaActual) return;
  socket.emit('nueva_comanda', { mesa: mesaActual, mozo: document.getElementById('mozo-input').value || 'Sin nombre', nota: document.getElementById('nota-input').value, items: ticket.map(t => ({id:t.id, name:t.name, emoji:t.emoji, qty:t.qty, price:t.price})) });
  mesasConPedido.add(mesaActual); clearTicket(); renderMesas(); showToast('Comanda enviada a cocina ✓');
}
socket.on('orders_update', (orders) => { mesasConPedido = new Set(orders.filter(o => o.status !== 'entregada').map(o => o.mesa)); renderMesas(); });
function updateClock() { const n = new Date(); document.getElementById('clock').textContent = n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0'); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
init();
</script>
</body>
</html>
